<!-- stat band: full-bleed section ground -->
<section class="stat-band" aria-label="BJJ Open Mat, at a glance" style="background: radial-gradient(900px 420px at 85% -40%, color-mix(in srgb, var(--color-section-glow) 70%, transparent), transparent 64%), var(--color-section); padding: 64px 0">
  <div class="stat-grid" style="max-width: 1200px; margin: 0 auto; padding: 0 48px; display: grid; grid-template-columns: repeat(4, auto); justify-content: space-between; gap: 32px">
    <div>
      <p style="font-family: var(--font-heading); font-weight: var(--font-heading-weight); font-size: clamp(36px, 3.6vw, 52px); line-height: 1.05; color: var(--color-text); margin: 0">100 mi</p>
      <p style="font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: color-mix(in srgb, var(--color-text) 64%, transparent); margin: 12px 0 0">Search radius</p>
    </div>
    <div>
      <p style="font-family: var(--font-heading); font-weight: var(--font-heading-weight); font-size: clamp(36px, 3.6vw, 52px); line-height: 1.05; color: var(--color-text); margin: 0">1 tap</p>
      <p style="font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: color-mix(in srgb, var(--color-text) 64%, transparent); margin: 12px 0 0">To say "I'm going"</p>
    </div>
    <div>
      <p style="font-family: var(--font-heading); font-weight: var(--font-heading-weight); font-size: clamp(36px, 3.6vw, 52px); line-height: 1.05; color: var(--color-text); margin: 0">Gi · No-Gi</p>
      <p style="font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: color-mix(in srgb, var(--color-text) 64%, transparent); margin: 12px 0 0">Filters that matter</p>
    </div>
    <div>
      <p style="font-family: var(--font-heading); font-weight: var(--font-heading-weight); font-size: clamp(36px, 3.6vw, 52px); line-height: 1.05; color: var(--color-text); margin: 0">$0</p>
      <p style="font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: color-mix(in srgb, var(--color-text) 64%, transparent); margin: 12px 0 0">For everyone</p>
    </div>
  </div>
</section>
