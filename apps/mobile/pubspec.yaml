name: bjj_open_mat
description: BJJ Open Mat Finder — find and check in to open mat sessions near you.
publish_to: 'none'
version: 0.1.0+16

environment:
  sdk: ^3.7.0
  flutter: ^3.29.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  dio: ^5.7.0
  auth0_flutter: ^2.1.0
  flutter_secure_storage: ^10.2.0
  google_maps_flutter: ^2.12.0
  geolocator: ^14.0.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  lottie: ^3.3.1
  share_plus: ^12.0.2
  url_launcher: ^6.3.1
  intl: ^0.20.2
  google_fonts: ^6.1.0
  lucide_icons: ^0.257.0
  record: ^5.1.2
  app_tracking_transparency: ^3.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  http_mock_adapter: ^0.6.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

# `record 5.2.1` pins the stale `record_linux 0.7.2`, which doesn't implement
# `record_platform_interface 1.6.0` (missing startStream / new hasPermission) —
# breaking the release compile even though we only ship Android/iOS. Pin a
# record_linux that targets the current interface.
dependency_overrides:
  record_linux: 1.3.1

flutter:
  uses-material-design: true

# App icons generated from the OpenMat brand kit (tool/branding/, rendered from
# brand/openmat-logo-stacked.svg — the stacked wordmark lockup on white).
# Regenerate: `dart run flutter_launcher_icons`.
flutter_launcher_icons:
  image_path: "tool/branding/app-icon-1024.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "tool/branding/app-icon-foreground-1024.png"

# Native launch/splash screen: OpenMat wordmark lockup centered on white.
# Regenerate: `dart run flutter_native_splash:create`.
flutter_native_splash:
  color: "#FFFFFF"
  image: "tool/branding/splash-logo.png"
  android: true
  ios: true
  web: false
  android_12:
    color: "#FFFFFF"
    image: "tool/branding/splash-logo.png"
