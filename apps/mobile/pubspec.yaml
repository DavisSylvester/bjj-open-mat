publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.0
  flutter: ^3.29.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  dio: ^5.7.0
  auth0_flutter: ^2.1.0
  flutter_secure_storage: ^10.2.0
  google_maps_flutter: ^2.12.0
  geolocator: ^14.0.2
  cached_network_image: ^3.4.1
  lottie: ^3.3.1
  share_plus: ^12.0.2
  url_launcher: ^6.3.1
  intl: ^0.20.2
  google_fonts: ^6.1.0
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  http_mock_adapter: ^0.6.1

flutter:
  uses-material-design: true
