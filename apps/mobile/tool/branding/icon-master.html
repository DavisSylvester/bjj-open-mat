<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; }
  /* The SVG fills the viewport; Playwright viewport size == output px. */
  svg { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<!--
  Full-bleed OpenMat app-icon master, derived from the brand kit
  (brand/openmat-appicon.svg): purple gradient (#5B53F2 -> #8B5CF6) with the
  white gi-belt mark. Corners are intentionally NOT rounded and the square is
  fully opaque (no alpha) so this is a valid iOS marketing-icon / launcher
  master; platform tooling applies its own masking.
-->
<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5B53F2"></stop><stop offset="1" stop-color="#8B5CF6"></stop>
    </linearGradient>
    <clipPath id="ail"><rect x="3.5" y="25.5" width="24" height="13" rx="6.5"></rect></clipPath>
    <clipPath id="air"><rect x="36.5" y="25.5" width="24" height="13" rx="6.5"></rect></clipPath>
  </defs>
  <rect width="512" height="512" fill="url(#g)"></rect>
  <g transform="translate(112,112) scale(4.5)">
    <path d="M27 38 L25.3 55.8 a1.6 1.6 0 0 0 2.5 1.4 L33 52 Z" fill="#FFFFFF"></path>
    <path d="M37 38 L38.7 55.8 a1.6 1.6 0 0 1 -2.5 1.4 L31 52 Z" fill="#FFFFFF"></path>
    <g clip-path="url(#ail)">
      <rect x="3.5" y="25.5" width="24" height="13" fill="#FFFFFF"></rect>
      <rect x="15.5" y="25.5" width="12" height="13" fill="#FFFFFF"></rect>
    </g>
    <g clip-path="url(#air)">
      <rect x="36.5" y="25.5" width="24" height="13" fill="#FFFFFF"></rect>
      <rect x="48.5" y="25.5" width="12" height="13" fill="#FFFFFF"></rect>
    </g>
    <rect x="23.5" y="22.5" width="17" height="19" rx="5.5" fill="#FFFFFF"></rect>
  </g>
</svg>
</body>
</html>
