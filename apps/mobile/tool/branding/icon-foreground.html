<!doctype html>
<html>
<head><meta charset="utf-8"><style>html,body{margin:0;padding:0;background:transparent}svg{display:block;width:100vw;height:100vh}</style></head>
<body>
<!--
  Android adaptive-icon FOREGROUND layer: the white gi-belt mark on a
  transparent canvas, scaled into the ~66% adaptive safe zone so the launcher's
  circle/squircle mask never clips it. Native mark viewBox is 64u; here it is
  placed on a 512u canvas at translate(160,160) scale(3.0) -> occupies the
  center 192u (~37.5% of the 108dp adaptive canvas, comfortably inside the
  safe zone).
-->
<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <clipPath id="ail"><rect x="3.5" y="25.5" width="24" height="13" rx="6.5"></rect></clipPath>
    <clipPath id="air"><rect x="36.5" y="25.5" width="24" height="13" rx="6.5"></rect></clipPath>
  </defs>
  <g transform="translate(160,160) scale(3.0)">
    <path d="M27 38 L25.3 55.8 a1.6 1.6 0 0 0 2.5 1.4 L33 52 Z" fill="#FFFFFF"></path>
    <path d="M37 38 L38.7 55.8 a1.6 1.6 0 0 1 -2.5 1.4 L31 52 Z" fill="#FFFFFF"></path>
    <g clip-path="url(#ail)">
      <rect x="3.5" y="25.5" width="24" height="13" fill="#FFFFFF"></rect>
      <rect x="15.5" y="25.5" width="12" height="13" fill="#FFFFFF"></rect>
    </g>
    <g clip-path="url(#air)">
      <rect x="36.5" y="25.5" width="24" height="13" fill="#FFFFFF"></rect>
      <rect x="48.5" y="25.5" width="12" height="13" fill="#FFFFFF"></rect>
    </g>
    <rect x="23.5" y="22.5" width="17" height="19" rx="5.5" fill="#FFFFFF"></rect>
  </g>
</svg>
</body>
</html>
