name: API Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'infra/**'
      - '.github/workflows/api-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC role assumption
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::318205107378:role/bjj-github-deploy
          aws-region: us-east-1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      # Builds the Lambda container image (Docker on the runner), pushes to the
      # CDK-managed ECR, and updates the Lambda + API Gateway.
      - name: Deploy API stack
        working-directory: infra
        run: npx cdk deploy BjjApiStack --require-approval never

      # Keep the OpenAI key (voice transcription) in the app secret that the
      # Lambda overlays onto process.env at cold start (config/secrets.mts).
      # Sourced from the GitHub secret so it is never committed. Skipped if the
      # secret isn't configured. Requires secretsmanager Get/PutSecretValue on
      # the bjj-github-deploy role.
      - name: Sync OPENAI_API_KEY into app secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then echo "OPENAI_API_KEY not set; skipping"; exit 0; fi
          CUR=$(aws secretsmanager get-secret-value --secret-id bjj-open-mat/app --region us-east-1 --query SecretString --output text)
          NEW=$(printf '%s' "$CUR" | jq --arg k "$OPENAI_API_KEY" '. + {OPENAI_API_KEY: $k}')
          aws secretsmanager put-secret-value --secret-id bjj-open-mat/app --region us-east-1 --secret-string "$NEW"
