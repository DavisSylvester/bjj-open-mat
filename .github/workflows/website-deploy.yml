name: Website Deploy

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'infra/lib/website-stack.ts'
      - '.github/workflows/website-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC role assumption
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build Angular site
        working-directory: website
        run: |
          bun install --frozen-lockfile
          bun run build --configuration production

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::318205107378:role/bjj-github-deploy
          aws-region: us-east-1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: Deploy website stack
        working-directory: infra
        env:
          BJJOPENMAT_CERT_ARN: ${{ secrets.BJJOPENMAT_CERT_ARN }}
        run: npx cdk deploy BjjWebsiteStack --require-approval never
